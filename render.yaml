services:
  - type: web
    name: rzd-seat-assistant
    runtime: docker
    plan: starter
    region: frankfurt
    numInstances: 1
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: CHECK_INTERVAL_HOURS
        value: "2"
      - key: APP_TIMEZONE
        value: Asia/Vladivostok
      - key: HEADLESS
        value: "true"
      - key: AUTO_RESERVE
        value: "true"
    disk:
      name: rzd-data
      mountPath: /var/data
      sizeGB: 1
